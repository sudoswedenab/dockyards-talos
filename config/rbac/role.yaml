---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dockyards-talos
rules:
- apiGroups:
  - dockyards.io
  resources:
  - releases
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - dockyards.io
  resources:
  - releases/status
  verbs:
  - patch
- apiGroups:
  - image.toolkit.fluxcd.io
  resources:
  - imagepolicies
  verbs:
  - create
  - get
  - list
  - patch
  - watch
- apiGroups:
  - image.toolkit.fluxcd.io
  resources:
  - imagerepositories
  verbs:
  - create
  - get
  - list
  - patch
  - watch
